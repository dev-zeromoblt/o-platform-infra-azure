# Example of using Azure Workload Identity with AWS federation
# Prerequisites:
# 1. Get OIDC issuer URL: pulumi stack output oidcIssuerUrl
# 2. Create AWS IAM OIDC provider with the issuer URL
# 3. Create IAM role with trust policy for the OIDC provider
# 4. Create Azure AD application and federated credential

apiVersion: v1
kind: Namespace
metadata:
  name: workload-identity-demo
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: workload-identity-sa
  namespace: workload-identity-demo
  annotations:
    # Replace with your Azure AD application client ID
    azure.workload.identity/client-id: "00000000-0000-0000-0000-000000000000"
    # Tenant ID is auto-populated by the cluster
  labels:
    azure.workload.identity/use: "true"
---
apiVersion: v1
kind: Pod
metadata:
  name: workload-identity-test
  namespace: workload-identity-demo
  labels:
    azure.workload.identity/use: "true"
spec:
  serviceAccountName: workload-identity-sa
  nodeSelector:
    kubernetes.io/arch: arm64
  containers:
  - name: azure-cli
    image: mcr.microsoft.com/azure-cli:latest
    command: ["sleep", "infinity"]
    env:
    - name: AZURE_CLIENT_ID
      value: "00000000-0000-0000-0000-000000000000"  # Replace with your client ID
---
# Test workload identity:
# 1. Deploy: kubectl apply -f workload-identity-example.yaml
# 2. Exec into pod: kubectl exec -it workload-identity-test -n workload-identity-demo -- /bin/bash
# 3. Test Azure access: az login --identity
# 4. Test AWS access (if federated): aws sts get-caller-identity
