# Example deployment to test Node Auto-Provisioning (NAP)
# Deploy this to see NAP automatically create ARM64 nodes

apiVersion: apps/v1
kind: Deployment
metadata:
  name: nap-test
  namespace: default
spec:
  replicas: 5
  selector:
    matchLabels:
      app: nap-test
  template:
    metadata:
      labels:
        app: nap-test
    spec:
      # Request ARM64 nodes
      nodeSelector:
        kubernetes.io/arch: arm64
      containers:
      - name: nginx
        image: nginx:alpine
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 1000m
            memory: 2Gi
        ports:
        - containerPort: 80
---
# Monitor NAP behavior:
# 1. Deploy: kubectl apply -f nap-test.yaml
# 2. Watch nodes: kubectl get nodes -w
# 3. Check node pools: kubectl get nodepools
# 4. Delete: kubectl delete -f nap-test.yaml
# 5. Watch scale-down after 10 minutes: kubectl get nodes -w
