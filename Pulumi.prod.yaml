config:
  azure-native:location: southeastasia
  o-platform-infra-azure:environment: prod
  o-platform-infra-azure:kubernetesVersion: "1.32"
  o-platform-infra-azure:systemPoolVmSize: Standard_D4pds_v5
  o-platform-infra-azure:systemPoolMinCount: "2"
  o-platform-infra-azure:systemPoolMaxCount: "6"
  o-platform-infra-azure:domain: az.zeromoblt.com
  o-platform-infra-azure:certManagerEmail: admin@zeromoblt.com
  # Set SSH public key with: pulumi config set sshPubKey "$(cat ~/.ssh/id_rsa.pub)"

  o-platform-infra-azure:sshPubKey: ssh-rsa 
  # Set admin user object ID with: pulumi config set adminUserObjectId "$(az ad signed-in-user show --query id -o tsv)"
  # This user will be granted "Azure Kubernetes Service RBAC Cluster Admin" role automatically
  o-platform-infra-azure:adminUserObjectId: 1610c587-f138-4532-a530-6dcf885513c7
