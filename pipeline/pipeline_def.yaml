name: o-platform-infra-azure CI/CD

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - pipeline/tests/**
      - '*.md'

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - '*.md'

variables:
  - group: azure-credentials
  - name: workingDirectory
    value: 'o-platform-infra-azure'
  - name: betaSubscriptionId
    value: 'e6a89fd3-6fdf-4300-a991-0b47b2bec750'
  - name: prodSubscriptionId
    value: 'e6a89fd3-6fdf-4300-a991-0b47b2bec750'

pool:
  vmImage: 'ubuntu-latest'

# ── PR builds: static pipeline validation only (no deploy, no Azure creds) ──
stages:
  - stage: Validate
    displayName: 'Pipeline Validation (PR)'
    condition: eq(variables['Build.Reason'], 'PullRequest')
    jobs:
      - job: StaticTests
        displayName: 'Run static pipeline validation tests'
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm install -g yarn
            displayName: 'Install Yarn'
          - script: |
              cd pipeline/tests
              yarn install --frozen-lockfile
              npx tsc --noEmit
              npx jest pipeline-validation.test.ts --ci
            displayName: 'Run pipeline-validation.test.ts'

  # ── Beta Deploy + Live Infra Tests ────────────────────────────────────────
  - stage: Beta
    displayName: 'Deploy to Beta'
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    dependsOn: []
    variables:
      - name: targetSubscriptionId
        value: '$(betaSubscriptionId)'
      - name: deploymentEnvironment
        value: 'beta'
    jobs:
      - deployment: DeployBeta
        displayName: 'Pulumi up — beta stack'
        environment: 'beta'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/pulumi-deploy.yml
                  parameters:
                    stack: 'beta'
                    environment: 'beta'
                    workingDirectory: '$(workingDirectory)'
                    subscriptionId: '$(targetSubscriptionId)'

      - job: VerifyBeta
        displayName: 'Live infra verification — beta'
        dependsOn: DeployBeta
        condition: succeeded()
        steps:
          - template: templates/infra-verify.yml
            parameters:
              stack: 'beta'
              environment: 'beta'
              workingDirectory: '$(workingDirectory)'
              subscriptionId: '$(targetSubscriptionId)'

  # ── Manual Approval Gate ─────────────────────────────────────────────────
  - stage: ProdApproval
    displayName: 'Production Approval Gate'
    dependsOn: Beta
    condition: succeeded()
    jobs:
      - job: WaitForApproval
        displayName: 'Wait for manual approval'
        pool: server
        timeoutInMinutes: 1440
        steps:
          - task: ManualValidation@0
            displayName: 'Approve production deployment'
            inputs:
              notifyUsers: |
                $(Build.RequestedForEmail)
              instructions: |
                Beta live infra tests passed. Please review and approve production deployment.
                Cluster: beta-aks-rg | Domain: az.zeromoblt.com
              onTimeout: 'reject'

  # ── Prod Deploy + Live Infra Tests ────────────────────────────────────────
  - stage: Prod
    displayName: 'Deploy to Production'
    dependsOn: ProdApproval
    condition: succeeded()
    variables:
      - name: targetSubscriptionId
        value: '$(prodSubscriptionId)'
      - name: deploymentEnvironment
        value: 'prod'
    jobs:
      - deployment: DeployProd
        displayName: 'Pulumi up — prod stack'
        environment: 'prod'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: templates/pulumi-deploy.yml
                  parameters:
                    stack: 'prod'
                    environment: 'prod'
                    workingDirectory: '$(workingDirectory)'
                    subscriptionId: '$(targetSubscriptionId)'

      - job: VerifyProd
        displayName: 'Live infra verification — prod'
        dependsOn: DeployProd
        condition: succeeded()
        steps:
          - template: templates/infra-verify.yml
            parameters:
              stack: 'prod'
              environment: 'prod'
              workingDirectory: '$(workingDirectory)'
              subscriptionId: '$(targetSubscriptionId)'

  # ── Notification ──────────────────────────────────────────────────────────
  - stage: Notify
    displayName: 'Deployment Summary'
    dependsOn:
      - Beta
      - Prod
    condition: always()
    jobs:
      - job: Summary
        displayName: 'Deployment summary'
        steps:
          - script: |
              echo "=== Deployment Summary ==="
              echo "Build:   $(Build.BuildNumber)"
              echo "Commit:  $(Build.SourceVersion)"
              echo "By:      $(Build.RequestedFor)"
              BETA_RESULT="$[stageDependencies.Beta.DeployBeta.result]"
              PROD_RESULT="$[stageDependencies.Prod.DeployProd.result]"
              echo "Beta:    $BETA_RESULT"
              echo "Prod:    $PROD_RESULT"
              if [ "$BETA_RESULT" = "Failed" ] || [ "$PROD_RESULT" = "Failed" ]; then
                echo "One or more stages failed — check artifacts and logs."
                exit 1
              fi
              echo "All deployments completed successfully."
            displayName: 'Print summary'
