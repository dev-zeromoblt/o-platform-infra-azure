parameters:
  - name: environment
    type: string
    default: 'beta'
  - name: subscriptionId
    type: string

steps:
  - script: |
      set -e
      echo "Verifying required environment variables for: ${{ parameters.environment }}"
      MISSING=""
      for VAR in AZURE_CLIENT_ID AZURE_CLIENT_SECRET AZURE_TENANT_ID PULUMI_ACCESS_TOKEN; do
        if [ -z "${!VAR}" ]; then MISSING="$MISSING $VAR"; fi
      done
      if [ -n "$MISSING" ]; then
        echo "Error: Missing required variables:$MISSING"
        exit 1
      fi
      echo "✓ All required environment variables are set"
    displayName: 'Verify environment variables'
    env:
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)

  - script: |
      set -e
      az login --service-principal \
        --username "$AZURE_CLIENT_ID" \
        --password "$AZURE_CLIENT_SECRET" \
        --tenant "$AZURE_TENANT_ID"
      az account set --subscription "$AZURE_SUBSCRIPTION_ID"
      echo "✓ Azure CLI authenticated"
      az account show --output table
    displayName: 'Authenticate Azure CLI'
    env:
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      AZURE_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}

  - script: |
      set -e
      if ! command -v pulumi &>/dev/null; then
        curl -fsSL https://get.pulumi.com | sh
        export PATH=$PATH:$HOME/.pulumi/bin
        echo "##vso[task.prependpath]$HOME/.pulumi/bin"
      fi
      pulumi version
      pulumi login
      pulumi whoami
    displayName: 'Install and authenticate Pulumi'
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)

  - script: |
      set -e
      if ! command -v kubelogin &>/dev/null; then
        KUBELOGIN_VERSION="v0.1.4"
        curl -LO "https://github.com/Azure/kubelogin/releases/download/${KUBELOGIN_VERSION}/kubelogin-linux-amd64.zip"
        unzip -q kubelogin-linux-amd64.zip
        sudo mv bin/linux_amd64/kubelogin /usr/local/bin/
        rm -rf bin kubelogin-linux-amd64.zip
      fi
      kubelogin --version
      echo "✓ kubelogin ready"
    displayName: 'Install kubelogin'
