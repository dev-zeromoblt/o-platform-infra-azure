parameters:
  - name: stack
    type: string
  - name: environment
    type: string
  - name: workingDirectory
    type: string
    default: 'o-platform-infra-azure'
  - name: subscriptionId
    type: string

steps:
  - checkout: self
    displayName: 'Checkout repository'
    path: $(workingDirectory)

  - template: ../scripts/setup-environment.yml
    parameters:
      environment: '${{ parameters.environment }}'
      subscriptionId: '${{ parameters.subscriptionId }}'

  - task: NodeTool@0
    displayName: 'Install Node.js 22'
    inputs:
      versionSpec: '20.x'

  - script: npm install -g yarn
    displayName: 'Install Yarn'

  - script: |
      set -e
      cd pipeline/tests
      yarn install --frozen-lockfile
    displayName: 'Install test dependencies'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)

  - script: |
      set -e
      # Inject Pulumi stack outputs as env vars for tests
      pulumi stack select ${{ parameters.stack }}
      pulumi stack output --json > /tmp/stack-outputs.json
      echo "Stack outputs:"
      cat /tmp/stack-outputs.json

      # Export each output as an env var
      python3 - << 'PYEOF'
      import json
      with open('/tmp/stack-outputs.json') as f:
          outputs = json.load(f)
      for k, v in outputs.items():
          safe_key = k.upper().replace('-', '_')
          print(f"##vso[task.setvariable variable=STACK_{safe_key}]{v}")
      PYEOF
    displayName: 'Load stack outputs into env vars'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)

  - script: |
      set -e
      # Configure kubectl from stack kubeconfig
      mkdir -p ~/.kube
      echo "$STACK_KUBECONFIG" > ~/.kube/config
      kubelogin convert-kubeconfig -l spn
      kubectl cluster-info
    displayName: 'Configure kubectl'
    env:
      ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
      ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      ARM_TENANT_ID: $(AZURE_TENANT_ID)
      ARM_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      STACK_KUBECONFIG: $(STACK_KUBECONFIG)
    continueOnError: true

  - script: |
      set -e
      cd pipeline/tests
      npx tsc --noEmit
      npx jest \
        --testPathPattern='aks|acr|dns|ingress|cert' \
        --ci \
        --reporters=default \
        --reporters=jest-junit \
        --forceExit
    displayName: 'Run live infrastructure tests — ${{ parameters.environment }}'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    env:
      # Azure auth
      AZURE_CLIENT_ID: $(AZURE_CLIENT_ID)
      AZURE_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      AZURE_TENANT_ID: $(AZURE_TENANT_ID)
      AZURE_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      # Stack outputs (injected above)
      STACK_AKSCLUSTERNAME: $(STACK_AKSCLUSTERNAME)
      STACK_RESOURCEGROUPNAME: $(STACK_RESOURCEGROUPNAME)
      STACK_INGRESSCONTROLLERIP: $(STACK_INGRESSCONTROLLERIP)
      STACK_ACRLOGINSERVER: $(STACK_ACRLOGINSERVER)
      STACK_ACRUSERNAME: $(STACK_ACRUSERNAME)
      STACK_ACRPASSWORD: $(STACK_ACRPASSWORD)
      STACK_DNSZONENAME: $(STACK_DNSZONENAME)
      STACK_DNSRESOURCEGROUPNAME: $(STACK_DNSRESOURCEGROUPNAME)
      STACK_DOMAINNAME: $(STACK_DOMAINNAME)
      TEST_ENVIRONMENT: ${{ parameters.environment }}

  - task: PublishTestResults@2
    displayName: 'Publish infra test results'
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: 'pipeline/tests/junit.xml'
      searchFolder: '$(Agent.BuildDirectory)/$(workingDirectory)'
      testRunTitle: 'Infra Verification — ${{ parameters.environment }}'
      failTaskOnFailedTests: true
