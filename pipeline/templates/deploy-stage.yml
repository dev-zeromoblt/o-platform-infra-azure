parameters:
  - name: stageName
    type: string
  - name: displayName
    type: string
  - name: environment
    type: string
  - name: stack
    type: string
  - name: dependsOn
    type: object
    default: []
  - name: condition
    type: string
    default: succeeded()
  - name: workingDirectory
    type: string
    default: 'o-platform-infra-azure'
  - name: subscriptionId
    type: string
  - name: requiresApproval
    type: boolean
    default: false
  - name: approvalTimeout
    type: number
    default: 1440

stages:
  - ${{ if parameters.requiresApproval }}:
    - stage: ${{ parameters.stageName }}Approval
      displayName: '${{ parameters.displayName }} — Approval Gate'
      dependsOn: ${{ parameters.dependsOn }}
      jobs:
        - job: WaitForApproval
          displayName: 'Manual approval for ${{ parameters.environment }}'
          pool: server
          timeoutInMinutes: ${{ parameters.approvalTimeout }}
          steps:
            - task: ManualValidation@0
              displayName: 'Approve ${{ parameters.environment }} deployment'
              inputs:
                notifyUsers: '$(Build.RequestedForEmail)'
                instructions: 'Review beta infra test results and approve production deployment.'
                onTimeout: 'reject'

  - stage: ${{ parameters.stageName }}
    displayName: '${{ parameters.displayName }}'
    dependsOn:
      - ${{ if parameters.requiresApproval }}:
        - ${{ parameters.stageName }}Approval
      - ${{ if not(parameters.requiresApproval) }}:
        - ${{ each dep in parameters.dependsOn }}:
          - ${{ dep }}
    condition: ${{ parameters.condition }}
    jobs:
      - deployment: Deploy${{ parameters.stageName }}
        displayName: 'Deploy ${{ parameters.stack }} stack'
        environment: '${{ parameters.environment }}'
        strategy:
          runOnce:
            deploy:
              steps:
                - template: pulumi-deploy.yml
                  parameters:
                    stack: '${{ parameters.stack }}'
                    environment: '${{ parameters.environment }}'
                    workingDirectory: '${{ parameters.workingDirectory }}'
                    subscriptionId: '${{ parameters.subscriptionId }}'
