parameters:
  - name: stack
    type: string
  - name: environment
    type: string
  - name: workingDirectory
    type: string
    default: 'o-platform-infra-azure'
  - name: subscriptionId
    type: string

steps:
  - checkout: self
    displayName: 'Checkout repository'
    path: $(workingDirectory)

  - template: ../scripts/setup-environment.yml
    parameters:
      environment: '${{ parameters.environment }}'
      subscriptionId: '${{ parameters.subscriptionId }}'

  - task: NodeTool@0
    displayName: 'Install Node.js 22'
    inputs:
      versionSpec: '22.x'

  - script: |
      set -e
      npm ci
    displayName: 'Install dependencies'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)

  - script: |
      set -e
      pulumi stack select ${{ parameters.stack }} --create
      pulumi config set azure-native:subscriptionId "${{ parameters.subscriptionId }}"
      echo "Stack configuration:"
      pulumi config
    displayName: 'Configure Pulumi stack — ${{ parameters.environment }}'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)
      ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
      ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      ARM_TENANT_ID: $(AZURE_TENANT_ID)
      ARM_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      ARM_USE_OIDC: false

  - script: |
      set -e
      echo "Running preview for ${{ parameters.environment }}..."
      timeout 600 pulumi preview --stack ${{ parameters.stack }} --diff --show-config --json \
        > preview-output.json || {
        EXIT=$?
        cat preview-output.json || true
        exit $EXIT
      }
      echo "Preview complete:"
      cat preview-output.json | python3 -c "
      import json,sys
      d=json.load(sys.stdin)
      for s in d.get('steps',[]): print(s.get('op'), s.get('urn','').split('::')[-1])
      " 2>/dev/null || true
    displayName: 'Pulumi preview — ${{ parameters.environment }}'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)
      ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
      ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      ARM_TENANT_ID: $(AZURE_TENANT_ID)
      ARM_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      ARM_USE_OIDC: false

  - script: |
      set -e
      echo "Deploying to ${{ parameters.environment }}..."
      pulumi up --stack ${{ parameters.stack }} --yes --skip-preview --logtostderr --verbose=3
      echo "✓ Deploy to ${{ parameters.environment }} complete"
    displayName: 'Deploy — ${{ parameters.environment }}'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)
      ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
      ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      ARM_TENANT_ID: $(AZURE_TENANT_ID)
      ARM_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      ARM_USE_OIDC: false

  - script: |
      set -e
      pulumi stack output --json > deployment-outputs.json
      echo "Stack outputs:"
      cat deployment-outputs.json
    displayName: 'Capture stack outputs'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    condition: succeeded()
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)

  - script: |
      echo "Deploy to ${{ parameters.environment }} failed — running rollback procedures..."
      pulumi cancel --stack ${{ parameters.stack }} --yes || true
      pulumi refresh --stack ${{ parameters.stack }} --yes || true
      pulumi logs --stack ${{ parameters.stack }} > failure-logs.txt || true
      echo "Rollback complete. Manual intervention may be required."
      exit 1
    displayName: 'Rollback on failure'
    workingDirectory: $(Agent.BuildDirectory)/$(workingDirectory)
    condition: failed()
    env:
      PULUMI_ACCESS_TOKEN: $(PULUMI_ACCESS_TOKEN)
      ARM_CLIENT_ID: $(AZURE_CLIENT_ID)
      ARM_CLIENT_SECRET: $(AZURE_CLIENT_SECRET)
      ARM_TENANT_ID: $(AZURE_TENANT_ID)
      ARM_SUBSCRIPTION_ID: ${{ parameters.subscriptionId }}
      ARM_USE_OIDC: false

  - task: PublishBuildArtifacts@1
    displayName: 'Publish deployment outputs'
    condition: always()
    inputs:
      pathToPublish: '$(Agent.BuildDirectory)/$(workingDirectory)/deployment-outputs.json'
      artifactName: 'deployment-outputs-${{ parameters.environment }}'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish preview output'
    condition: always()
    inputs:
      pathToPublish: '$(Agent.BuildDirectory)/$(workingDirectory)/preview-output.json'
      artifactName: 'preview-output-${{ parameters.environment }}'

  - task: PublishBuildArtifacts@1
    displayName: 'Publish failure logs'
    condition: failed()
    inputs:
      pathToPublish: '$(Agent.BuildDirectory)/$(workingDirectory)/failure-logs.txt'
      artifactName: 'failure-logs-${{ parameters.environment }}'
